    <script>
    const supabaseUrl = 'https://dqtictujkhxultwoaqaw.supabase.co';

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
    // --- EmailJS Config ---
    const EMAILJS_SERVICE_ID = 'service_zylncvg';
    const EMAILJS_TEMPLATE_ID = 'template_lib4f21';

    // --- Original Elements ---
    const loginForm = document.getElementById('loginForm');
    const messageArea = document.getElementById('messageArea');
    const attemptCounter = document.getElementById('attemptCounter');
    const loginButton = document.getElementById('loginButton');
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIconClosed = document.getElementById('eyeIconClosed');
    const eyeIconOpen = document.getElementById('eyeIconOpen');
    const emailInput = document.getElementById('email');

    // --- 2FA Elements ---
    const otpWrapper = document.getElementById('otpWrapper');
    const otpInput = document.getElementById('otp');
    const credentialsWrapper = document.getElementById('credentialsWrapper');
    const forgotPasswordLink = document.getElementById('forgotPasswordLink');
    const countdownElement = document.getElementById('countdown');

    // --- Remember Me Element ---
    const rememberMeCheckbox = document.getElementById('rememberMe');

    // --- Config ---
    const ADMIN_PAGE = 'admin_Access.html';
    const MEMBER_PAGE = 'faculty_Dashboard.html';
    let loginAttempts = 0;
    const MAX_ATTEMPTS = 5;
    const LOCKOUT_TIME = 15 * 60 * 1000;
    let awaitingOtp = false;

    // --- OTP Timer Variables ---
    let otpTimer = null;
    let otpExpirationTime = null;
    const OTP_EXPIRATION_MINUTES = 10;

    // --- OTP Functions (Unchanged) ---
    function generateOTP() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    // --- OTP Timer Functions ---
    function startOtpCountdown() {
        // Set expiration time to 10 minutes from now
        otpExpirationTime = Date.now() + (OTP_EXPIRATION_MINUTES * 60 * 1000);
        
        // Clear any existing timer
        if (otpTimer) {
            clearInterval(otpTimer);
        }
        
        // Start countdown
        otpTimer = setInterval(updateCountdown, 1000);
        updateCountdown(); // Update immediately
    }

    function updateCountdown() {
        const now = Date.now();
        const timeLeft = otpExpirationTime - now;
        
        if (timeLeft <= 0) {
            // OTP expired
            clearInterval(otpTimer);
            otpTimer = null;
            countdownElement.textContent = "00:00";
            countdownElement.classList.remove('text-ph-orange');
            countdownElement.classList.add('text-red-500');
            
            // Disable OTP input and show expiration message
            otpInput.disabled = true;
            otpInput.classList.add('opacity-50');
            messageArea.textContent = '✗ OTP has expired. Please request a new one.';
            messageArea.classList.remove('text-ph-orange');
            messageArea.classList.add('text-red-500');
            
            // Reset to login state
            setTimeout(() => {
                resetToLoginState();
            }, 3000);
            
            return;
        }
        
        // Calculate minutes and seconds
        const minutes = Math.floor(timeLeft / (60 * 1000));
        const seconds = Math.floor((timeLeft % (60 * 1000)) / 1000);
        
        // Format and display
        const formattedTime = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        countdownElement.textContent = formattedTime;
        
        // Change color when less than 2 minutes left
        if (timeLeft < 2 * 60 * 1000) {
            countdownElement.classList.remove('text-ph-orange');
            countdownElement.classList.add('text-red-500');
        }
    }

    function stopOtpCountdown() {
        if (otpTimer) {
            clearInterval(otpTimer);
            otpTimer = null;
        }
    }

    function resetToLoginState() {
        // Clear timer
        stopOtpCountdown();
        
        // Reset UI
        credentialsWrapper.classList.remove('hidden');
        forgotPasswordLink.classList.remove('hidden');
        otpWrapper.classList.add('hidden');
        
        // Reset form
        otpInput.value = '';
        otpInput.disabled = false;
        otpInput.classList.remove('opacity-50');
        
        // Reset countdown display
        countdownElement.textContent = "10:00";
        countdownElement.classList.remove('text-red-500');
        countdownElement.classList.add('text-ph-orange');
        
        // Reset button and state
        submitButton.textContent = 'Login';
        awaitingOtp = false;
        
        // Clear session storage
        sessionStorage.removeItem('otpVerificationData');
        
        // Clear message
        messageArea.textContent = '';
        messageArea.classList.remove('text-red-500', 'text-ph-orange');
    }

    async function sendOtpEmail(userEmail, userName, otp) {
        try {
            const templateParams = {
                to_email: userEmail,
                to_name: userName || 'User',
                otp_code: otp,
            };
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams);
            console.log('✅ OTP Email sent successfully!');
            return true;
        } catch (err) {
            console.error('Failed to send OTP email:', err);
            messageArea.textContent = `✗ Failed to send OTP. Error: ${err.text || err.message}`;
            messageArea.classList.add('text-red-500');
            return false;
        }
    }

    // --- Password Toggle (Unchanged) ---
    togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type');
        if (type === 'password') {
            passwordInput.setAttribute('type', 'text');
            eyeIconClosed.classList.add('hidden');
            eyeIconOpen.classList.remove('hidden');
        } else {
            passwordInput.setAttribute('type', 'password');
            eyeIconClosed.classList.remove('hidden');
            eyeIconOpen.classList.add('hidden');
        }
    });

    // --- Lockout & Attempt Functions (Unchanged) ---
    function checkLockout() {
        const lockoutData = localStorage.getItem('loginLockout');
        if (lockoutData) {
            const { timestamp, attempts } = JSON.parse(lockoutData);
            const currentTime = new Date().getTime();
            if (currentTime - timestamp < LOCKOUT_TIME && attempts >= MAX_ATTEMPTS) {
                const remainingTime = Math.ceil((LOCKOUT_TIME - (currentTime - timestamp)) / 60000);
                messageArea.textContent = `✗ Too many failed attempts. Try again in ${remainingTime} minutes`;
                messageArea.classList.add('text-red-500');
                loginButton.disabled = true;
                attemptCounter.textContent = `Account temporarily locked`;
                return true;
            } else if (currentTime - timestamp >= LOCKOUT_TIME) {
                localStorage.removeItem('loginLockout');
                loginAttempts = 0;
                loginButton.disabled = false;
            } else {
                loginAttempts = attempts;
            }
        }
        return false;
    }

    function updateAttemptCounter() {
        const remaining = MAX_ATTEMPTS - loginAttempts;
        if (loginAttempts > 0) {
            attemptCounter.textContent = `${remaining} attempt${remaining !== 1 ? 's' : ''} remaining`;
            attemptCounter.classList.add('text-yellow-500');
        }
    }

    // --- 🌟 FIXED: Session Functions ---
    // This now matches your "working" code's logic.
    // It ALWAYS stores the flat user object in localStorage.
    function setLoginSession(userData) {
        localStorage.setItem('loggedInUser', JSON.stringify(userData));
        sessionStorage.removeItem('loggedInUser'); // Clear session storage just in case
    }

    // This now matches your "working" code's logic.
    // It ONLY checks localStorage for a flat user object.
    function checkExistingSession() {
        const loggedInUser = localStorage.getItem('loggedInUser');
        if (loggedInUser) {
            const userData = JSON.parse(loggedInUser);
            // Redirect based on stored user type
            if (userData.userType === 'admin') {
                window.location.href = ADMIN_PAGE;
            } else {
                window.location.href = MEMBER_PAGE;
            }
        }
    }

    // --- Remember Me Preference Function ---
    // (This was correct, still using 'admins' table as requested)
    async function fetchRememberMePreference() {
        const email = emailInput.value.trim();
        if (!email) return;

        let preference = false;

        try {
            let { data: admin, error: adminError } = await supabaseClient
                .from('admins') // Using 'admins'
                .select('remember_me_preference')
                .eq('email', email)
                .maybeSingle();
            
            if (admin) {
                preference = admin.remember_me_preference;
            } else {
                let { data: member, error: memberError } = await supabaseClient
                    .from('members')
                    .select('remember_me_preference')
                    .eq('email', email)
                    .maybeSingle();
                
                if (member) {
                    preference = member.remember_me_preference;
                }
            }
            
            rememberMeCheckbox.checked = preference;

        } catch (err) {
            console.warn('Could not fetch remember me preference:', err.message);
        }
    }

    // --- Initialize ---
    checkExistingSession(); // Uses the new fixed function
    checkLockout();
    updateAttemptCounter();

    emailInput.addEventListener('blur', fetchRememberMePreference);

    // --- SECURE AUTHENTICATION LOGIN HANDLER ---
    loginForm.addEventListener('submit', async function(event) {
        event.preventDefault();
        messageArea.textContent = '';

        if (checkLockout() && !awaitingOtp) {
            return;
        }

        const submitButton = loginForm.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.textContent = 'Processing...';
        submitButton.classList.add('opacity-70', 'cursor-not-allowed');

        const rememberMe = rememberMeCheckbox.checked;

        try {
            if (awaitingOtp) {
                // --- STATE 2: VERIFYING OTP ---
                // (Your OTP logic remains completely unchanged here)
                const enteredOtp = otpInput.value;
                const storedData = sessionStorage.getItem('otpVerificationData');
                
                if (!storedData) throw new Error('Session expired. Please start over.');

                const { otp, userData, userType, redirectPage } = JSON.parse(storedData);

                if (enteredOtp === otp) {
                    stopOtpCountdown();
                    messageArea.textContent = '✓ OTP Verified! Logging in...';
                    messageArea.classList.remove('text-red-500');
                    messageArea.classList.add('text-ph-orange');

                    setLoginSession(userData); 
                    sessionStorage.removeItem('otpVerificationData');
                    console.log(`✅ ${userType} login successful:`, userData.email); 
                    
                    const tableName = (userType === 'Admin') ? 'admins' : 'memberstest';
                    await supabaseClient
                        .from(tableName)
                        .update({ remember_me_preference: rememberMe }) 
                        .eq('id', userData.id);

                    setTimeout(() => { window.location.href = redirectPage; }, 1000);
                } else {
                    messageArea.textContent = '✗ Invalid OTP. Please try again.';
                    messageArea.classList.add('text-red-500');
                    otpInput.focus();
                }

            } else {
                // --- STATE 1: VERIFYING SECURE PASSWORD ---
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                
                const recaptchaResponse = grecaptcha.getResponse(); 
                if (!recaptchaResponse) {
                    messageArea.textContent = '✗ Please complete the reCAPTCHA verification';
                    messageArea.classList.add('text-red-500');
                    grecaptcha.reset();
                    return; 
                }

                // 1. Let Supabase securely verify the password
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (authError) {
                    // Password or Email is wrong
                    loginAttempts++;
                    localStorage.setItem('loginLockout', JSON.stringify({
                        timestamp: new Date().getTime(),
                        attempts: loginAttempts
                    }));

                    if (loginAttempts >= MAX_ATTEMPTS) {
                        messageArea.textContent = '✗ Maximum attempts exceeded. Account locked for 15 minutes';
                        loginButton.disabled = true;
                        attemptCounter.textContent = 'Account temporarily locked';
                        attemptCounter.classList.add('text-red-500');
                    } else {
                        messageArea.textContent = '✗ Invalid email or password';
                        updateAttemptCounter();
                    }
                    grecaptcha.reset();
                    return; 
                }

                // 2. Password is correct! Now fetch their specific profile data
                const loggedInUser = authData.user;
                let userData = null;
                let userType = null;
                let redirectPage = null;

                // Check 'admins' table
                const { data: adminData } = await supabaseClient
                    .from('admins')
                    .select('*')
                    .eq('email', loggedInUser.email)
                    .maybeSingle();

                if (adminData) {
                    userData = {
                        id: adminData.id,
                        email: adminData.email,
                        avatar_url: adminData.avatar_url,
                        userType: 'admin',
                        loginTime: new Date().toISOString()
                    };
                    userType = 'Admin';
                    redirectPage = ADMIN_PAGE;
                } else {
                    // Check 'memberstest' table
                    const { data: memberData } = await supabaseClient
                        .from('memberstest')
                        .select('*')
                        .eq('email', loggedInUser.email)
                        .maybeSingle();
                    
                    if (memberData) {
                        // 🚨 THE BOUNCER: Check if they are approved BEFORE letting them log in
                        if (memberData.is_approved === false) {
                            messageArea.textContent = '✗ Your account is pending Admin approval. Please check back later.';
                            messageArea.classList.remove('text-ph-orange');
                            messageArea.classList.add('text-red-500');
                            
                            await supabaseClient.auth.signOut(); // Log them out immediately
                            grecaptcha.reset();
                            return; // Stop execution! Do not run the redirect code below.
                        }

                        // If approved, create the session data (using the new firstName and lastName)
                        userData = {
                            id: memberData.id,
                            email: memberData.email,
                            firstName: memberData.firstName, 
                            lastName: memberData.lastName,
                            user_type: memberData.user_type,
                            avatar_url: memberData.avatar_url,
                            userType: 'member',
                            created_at: memberData.created_at,
                            loginTime: new Date().toISOString()
                        };
                        userType = 'Member';
                        redirectPage = MEMBER_PAGE;
                    }
                }

                // 3. Complete the login flow (Bypassing OTP for testing)
                if (userData) {
                    messageArea.textContent = '✓ Login correct! Bypassing OTP for testing...';
                    messageArea.classList.remove('text-red-500');
                    messageArea.classList.add('text-ph-orange');

                    setLoginSession(userData); 
                    console.log(`✅ ${userType} login successful (OTP Bypassed):`, userData.email); 
                    
                    const tableName = (userType === 'Admin') ? 'admins' : 'memberstest';
                    await supabaseClient
                        .from(tableName)
                        .update({ remember_me_preference: rememberMe }) 
                        .eq('id', userData.id);

                    setTimeout(() => { window.location.href = redirectPage; }, 1000);

                } else {
                    messageArea.textContent = '✗ Account authenticated, but profile missing. Contact admin.';
                    messageArea.classList.add('text-red-500');
                    await supabaseClient.auth.signOut(); // Log out for safety
                    grecaptcha.reset();
                }
            }
        } catch (err) {
            messageArea.textContent = `✗ An error occurred: ${err.message}`;
            messageArea.classList.add('text-red-500');
            console.error('Error:', err);
            grecaptcha.reset();
            awaitingOtp = false;
        } finally {
            if (!checkLockout() || awaitingOtp) {
                submitButton.disabled = false;
                submitButton.classList.remove('opacity-70', 'cursor-not-allowed');
                if (!awaitingOtp) {
                    submitButton.textContent = 'Login';
                }
            }
        }
    });
</script>

</body>
</html>
