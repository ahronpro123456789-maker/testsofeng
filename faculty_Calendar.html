<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="CCSICTLOGOCROP.png">
    <title>Faculty Calendar - CentraNounceIT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="keys.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Google Translate (once only) -->
    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'en,tl',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <style>
        /* ── CSS Variables: light default, dark on body.dark-mode ── */
        :root {
            --bg:         #f5faf2;
            --surface:    #ffffff;
            --card:       #e8f5e0;
            --border:     #c9e5ba;
            --text:       #163300;
            --text-muted: #2d5514;
            --hover:      #e8f5e0;
            --accent:     #7acc50;
            --accent-hi:  #9FE870;
            --shadow-g:   rgba(122,204,80,0.2);
        }
        body.dark-mode {
            --bg:         #000000;
            --surface:    #0f0f0f;
            --card:       #1a1a1a;
            --border:     #2d5514;
            --text:       #ffffff;
            --text-muted: #b8d6a0;
            --hover:      #1a1a1a;
            --accent:     #9FE870;
            --accent-hi:  #9FE870;
            --shadow-g:   rgba(159,232,112,0.2);
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color .3s, color .3s;
        }

        /* ── Calendar date cell ── */
        .calendar-date {
            aspect-ratio: 1/1;
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text);
            transition: border-color .3s, box-shadow .3s, transform .3s, background .3s;
        }
        .calendar-date:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--shadow-g);
        }
        .calendar-date.today {
            border-color: var(--accent);
            background: var(--card);
            box-shadow: 0 4px 16px var(--shadow-g);
        }
        .calendar-date.today .date-number { color: var(--accent); }
        @media (max-width:640px) { .calendar-date { aspect-ratio: auto; min-height: 80px; } }

        /* ── Scrollbar ── */
        .announcement-list { max-height: 60px; overflow-y: auto; }
        .announcement-list::-webkit-scrollbar { width: 4px; }
        .announcement-list::-webkit-scrollbar-track { background: transparent; }
        .announcement-list::-webkit-scrollbar-thumb { background: linear-gradient(135deg,#9FE870,#7acc50); border-radius: 2px; }

        /* ── Modals ── */
        @keyframes modalSlideIn { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
        .modal-enter { animation: modalSlideIn .3s ease-out; }
        .modal-surface { background:var(--surface); border:2px solid var(--accent); box-shadow:0 20px 60px var(--shadow-g); }
        .modal-header-border { border-bottom:1px solid var(--border); }

        /* ── Form inputs using CSS vars ── */
        .form-input {
            width:100%; padding:12px; border-radius:12px;
            border:1px solid var(--border);
            background:var(--card); color:var(--text);
            font-family:'Inter',sans-serif; font-size:.95rem;
            transition:all .3s; outline:none;
        }
        .form-input:focus { border-color:var(--accent); background:var(--surface); box-shadow:0 0 0 4px rgba(159,232,112,.2); }
        .form-input::placeholder { color:var(--text-muted); }
        textarea.form-input { resize:vertical; min-height:80px; }

        /* ── UI helpers ── */
        .day-header { background:linear-gradient(135deg,var(--accent-hi),var(--accent)); color:#000; font-weight:700; }
        .main-card  { background:var(--surface); border:1px solid var(--border); }
        .header-btn { background:var(--surface); color:var(--text-muted); border:1px solid var(--border); transition:all .3s; }
        .header-btn:hover { background:var(--card); color:var(--text); border-color:var(--accent); }
        .modal-close-btn { color:var(--text-muted); transition:color .3s,transform .3s; cursor:pointer; }
        .modal-close-btn:hover { color:var(--accent); transform:rotate(90deg); }
        .ann-pill { background:rgba(159,232,112,.18); color:var(--accent); font-weight:600; }
        body:not(.dark-mode) .ann-pill { background:rgba(122,204,80,.18); color:#2d5514; }
        .ann-list-item { background:var(--card); border:2px solid var(--border); transition:border-color .3s; }
        .ann-list-item:hover { border-color:var(--accent); }
        .detail-divider { border-top:1px solid var(--border); }
        .detail-icon { color:var(--accent); }
        .nav-btn { background:linear-gradient(135deg,var(--accent-hi),var(--accent)); color:#000; font-weight:700; transition:all .3s; }
        .nav-btn:hover { box-shadow:0 8px 20px var(--shadow-g); transform:translateY(-2px); }
        .poster-avatar { border:1px solid var(--accent); }

        /* ── Google Translate banner suppression ── */
        .goog-te-banner-frame,
        .goog-te-banner-frame.skiptranslate,
        .skiptranslate > iframe,
        #goog-gt-tt,
        .goog-te-balloon-frame { display:none !important; visibility:hidden !important; height:0 !important; }
        body { top:0 !important; position:static !important; }
        body.translated-ltr, body.translated-rtl { top:0 !important; margin-top:0 !important; }

        /* ── Google Translate widget ── */
        .goog-te-gadget { font-family:'Inter',sans-serif !important; font-size:.85rem !important; line-height:1 !important; }
        .goog-te-gadget-simple { background-color:var(--card) !important; border:1px solid var(--border) !important; border-radius:8px !important; padding:6px 10px !important; }
        .goog-te-gadget-simple .goog-te-menu-value,
        .goog-te-gadget-simple .goog-te-menu-value span,
        .goog-te-gadget-simple span,
        .goog-te-gadget-simple a { color:var(--text) !important; font-weight:600 !important; background:none !important; }
        .goog-te-gadget-icon { display:none !important; }
        #google_translate_element select, .goog-te-combo {
            background-color:var(--card) !important; color:var(--text) !important;
            border:1px solid var(--border) !important; border-radius:8px !important;
            padding:6px 10px !important; font-family:'Inter',sans-serif !important;
            font-size:.85rem !important; font-weight:600 !important;
            outline:none !important; cursor:pointer !important;
        }
        #google_translate_element select option, .goog-te-combo option {
            background-color:var(--card) !important; color:var(--text) !important;
        }

        /* ── Translate dropdown bubble ── */
        .translate-dropdown {
            position:fixed; bottom:90px; right:30px;
            background:var(--surface); border:2px solid var(--accent);
            border-radius:12px; padding:8px;
            box-shadow:0 8px 20px rgba(0,0,0,.2); z-index:998;
        }

        /* ── Chatbot loading dots ── */
        .dot { animation:dotBounce 1.4s infinite ease-in-out both; }
        .dot:nth-child(1){animation-delay:-.32s;}
        .dot:nth-child(2){animation-delay:-.16s;}
        @keyframes dotBounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
        [x-cloak] { display:none !important; }

        /* ── Banner pulse ── */
        @keyframes pulse2 { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
        .animate-pulse2 { animation:pulse2 2s ease-in-out infinite; }
    </style>
</head>

<body class="light-mode min-h-screen flex items-start justify-center p-4 sm:p-6 lg:p-8">

    <div class="w-full max-w-6xl">

        <!-- ── TOP BAR ── -->
        <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
            <a href="faculty_Dashboard.html"
               class="header-btn inline-flex items-center gap-2 px-4 py-2.5 rounded-xl shadow-lg text-sm sm:text-base font-semibold group">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                     class="transition-transform group-hover:-translate-x-1" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
                </svg>
                <span>Back to Dashboard</span>
            </a>
            <button id="themeToggle"
                class="header-btn px-4 py-2.5 rounded-xl shadow-lg text-sm sm:text-base font-semibold flex items-center gap-2">
                <i class="fas fa-sun" id="themeIcon"></i>
            </button>
        </div>

        <!-- ── MAIN CARD ── -->
        <div class="main-card rounded-2xl shadow-2xl p-4 sm:p-6 lg:p-8">

            <div class="text-center mb-6 sm:mb-8">
                <h1 class="text-2xl sm:text-3xl lg:text-4xl font-bold mb-2" style="color:var(--accent);">
                    📅 Department Announcement Calendar
                </h1>
                <p class="text-sm sm:text-base" style="color:var(--text-muted);">View and manage announcements</p>
            </div>

            <!-- Month Navigation -->
            <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
                <button id="prevMonth" class="nav-btn w-full sm:w-auto px-6 py-3 rounded-xl text-sm sm:text-base order-2 sm:order-1">‹ Previous</button>
                <div id="monthYear" class="text-xl sm:text-2xl lg:text-3xl font-bold order-1 sm:order-2" style="color:var(--accent);"></div>
                <button id="nextMonth" class="nav-btn w-full sm:w-auto px-6 py-3 rounded-xl text-sm sm:text-base order-3">Next ›</button>
            </div>

            <!-- Calendar Grid -->
            <div id="calendarGrid" class="grid grid-cols-7 gap-1 sm:gap-2 lg:gap-3"></div>
        </div>
    </div>

    <!-- ══ MODAL 1 — Date announcement list + Add form ══ -->
    <div id="modalOverlay" class="hidden fixed inset-0 bg-black/75 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="modal-surface w-full max-w-2xl rounded-2xl max-h-[90vh] flex flex-col modal-enter">

            <div class="flex items-center justify-between p-4 sm:p-6 modal-header-border">
                <h3 id="modalDateTitle" class="text-lg sm:text-xl lg:text-2xl font-bold" style="color:var(--accent);"></h3>
                <button id="closeBtn" class="modal-close-btn text-3xl sm:text-4xl leading-none">&times;</button>
            </div>

            <div class="overflow-y-auto flex-grow p-4 sm:p-6">
                <ul id="modal-announcement-list" class="space-y-4 mb-6"></ul>

                <!-- Add announcement form -->
                <form id="add-announcement-form" autocomplete="off" class="space-y-4 pt-6" style="border-top:2px solid var(--border);">
                    <div>
                        <label class="block text-sm font-semibold mb-2" style="color:var(--text);">Title *</label>
                        <input type="text" id="announcement-title" placeholder="Announcement title..." required class="form-input">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2" style="color:var(--text);">Description</label>
                        <textarea id="announcement-description" placeholder="Announcement description..." rows="3" class="form-input"></textarea>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-2" style="color:var(--text);">Category *</label>
                            <input type="text" id="announcement-category" placeholder="e.g., Meeting, Event" required class="form-input">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-2" style="color:var(--text);">Target Audience</label>
                            <input type="text" id="announcement-audience" placeholder="e.g., All Staff, Faculty" class="form-input">
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <button type="submit" id="add-announcement-btn"
                            class="w-full font-bold py-3 px-6 rounded-xl text-black transition-all duration-300 hover:-translate-y-1"
                            style="background:linear-gradient(135deg,var(--accent-hi),var(--accent)); box-shadow:0 4px 12px var(--shadow-g);">
                            Add Announcement
                        </button>
                        <a href="upload_Ocr.html" class="flex-shrink-0 text-sm font-semibold whitespace-nowrap" style="color:var(--accent);">
                            Using OCR
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- ══ MODAL 2 — Edit Announcement ══ -->
    <div id="editModalOverlay" class="hidden fixed inset-0 bg-black/75 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="modal-surface w-full max-w-2xl rounded-2xl max-h-[90vh] flex flex-col modal-enter">

            <div class="flex items-center justify-between p-4 sm:p-6 modal-header-border">
                <h3 class="text-lg sm:text-xl lg:text-2xl font-bold" style="color:var(--accent);">Edit Announcement</h3>
                <button id="closeEditBtn" class="modal-close-btn text-3xl sm:text-4xl leading-none">&times;</button>
            </div>

            <div class="overflow-y-auto flex-grow p-4 sm:p-6">
                <form id="edit-announcement-form" autocomplete="off" class="space-y-4">
                    <input type="hidden" id="edit-announcement-id">
                    <div>
                        <label class="block text-sm font-semibold mb-2" style="color:var(--text);">Title *</label>
                        <input type="text" id="edit-announcement-title" placeholder="Announcement title..." required class="form-input">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-2" style="color:var(--text);">Description</label>
                        <textarea id="edit-announcement-description" placeholder="Announcement description..." rows="3" class="form-input"></textarea>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold mb-2" style="color:var(--text);">Category *</label>
                            <input type="text" id="edit-announcement-category" placeholder="e.g., Meeting, Event" required class="form-input">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold mb-2" style="color:var(--text);">Target Audience</label>
                            <input type="text" id="edit-announcement-audience" placeholder="e.g., All Staff, Faculty" class="form-input">
                        </div>
                    </div>
                    <button type="submit"
                        class="w-full font-bold py-3 px-6 rounded-xl text-black transition-all duration-300 hover:-translate-y-1"
                        style="background:linear-gradient(135deg,var(--accent-hi),var(--accent)); box-shadow:0 4px 12px var(--shadow-g);">
                        Save Changes
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ══ MODAL 3 — View Announcement Detail ══ -->
    <div id="viewModalOverlay" class="hidden fixed inset-0 bg-black/75 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="modal-surface w-full max-w-2xl rounded-2xl max-h-[90vh] flex flex-col modal-enter">

            <div class="flex items-center justify-between p-4 sm:p-6 modal-header-border">
                <h3 id="viewModalTitle" class="text-lg sm:text-xl lg:text-2xl font-bold" style="color:var(--accent);">Announcement Details</h3>
                <button id="closeViewBtn" class="modal-close-btn text-3xl sm:text-4xl leading-none">&times;</button>
            </div>

            <div class="overflow-y-auto flex-grow p-4 sm:p-6" id="viewModalBody"></div>
        </div>
    </div>

    <!-- ══ CHATBOT (Alpine.js) — bottom-[160px] right-[30px] ══ -->
    <div x-data="initChatbot()" x-cloak>
        <button @click="isOpen = !isOpen"
            class="fixed bottom-[160px] right-[30px] w-[50px] h-[50px] rounded-full flex items-center justify-center text-black cursor-pointer z-[999] border-2 text-xl transition-all duration-300 hover:scale-110 active:scale-95"
            style="background:linear-gradient(135deg,#9FE870,#8AD95E); border-color:#9FE870; box-shadow:0 4px 12px rgba(159,232,112,.4);"
            aria-label="Toggle chatbot">
            <i x-show="!isOpen" class="fa-solid fa-robot"></i>
            <i x-show="isOpen"  class="fa-solid fa-xmark"></i>
        </button>

        <div x-show="isOpen"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-90 translate-y-5"
             x-transition:enter-end="opacity-100 scale-100 translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 scale-100 translate-y-0"
             x-transition:leave-end="opacity-0 scale-90 translate-y-5"
             class="fixed bottom-[240px] right-[30px] w-[90vw] max-w-[400px] max-h-[calc(100vh-260px)] min-h-[300px] rounded-3xl flex flex-col overflow-hidden z-[998] border transition-colors duration-300"
             style="background:var(--bg); border-color:var(--border); box-shadow:0 20px 60px rgba(0,0,0,.5);">

            <!-- Header -->
            <div class="px-4 py-3 border-b flex items-center justify-between gap-3 flex-shrink-0"
                 style="background:var(--surface); border-color:var(--border);">
                <div>
                    <h2 class="font-bold text-sm tracking-wide" style="color:var(--text);">Chatbot</h2>
                    <p class="text-[11px] font-medium" style="color:var(--accent);">Your Campus Assistant</p>
                </div>
                <button @click="isOpen = false" class="hover:opacity-70 transition-colors w-6 h-6 flex items-center justify-center" style="color:var(--text-muted);">
                    <i class="fa-solid fa-minus text-sm"></i>
                </button>
            </div>

            <!-- Messages -->
            <div id="chatbot-messages-container"
                 class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"
                 style="background:var(--bg);">
                <template x-for="(msg, index) in messages" :key="index">
                    <div :style="msg.role === 'user'
                        ? 'background:linear-gradient(135deg,#9FE870,#8AD95E);color:#000;border:1px solid #9FE870;border-radius:16px 16px 4px 16px;margin-left:auto;max-width:85%;padding:12px;font-size:.875rem;line-height:1.5;'
                        : 'background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:16px 16px 16px 4px;margin-right:auto;max-width:85%;padding:12px;font-size:.875rem;line-height:1.5;'">
                        <p class="whitespace-pre-wrap" x-text="msg.content"></p>
                    </div>
                </template>
                <div x-show="isLoading" class="flex gap-1 p-3 border self-start flex-shrink-0"
                     style="border-radius:16px 16px 16px 4px; background:var(--card); border-color:var(--border);">
                    <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                    <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                    <div class="dot w-1.5 h-1.5 rounded-full" style="background:var(--accent);"></div>
                </div>
            </div>

            <!-- Footer -->
            <div class="p-4 border-t flex-shrink-0" style="background:var(--surface); border-color:var(--border);">
                <form @submit.prevent="sendMessage()" class="flex gap-2 items-center">
                    <input type="text" x-model="userInput"
                        placeholder="Ask about announcements..."
                        class="flex-1 px-4 py-2.5 rounded-xl border text-[.875rem] outline-none transition-all duration-300"
                        style="background:var(--card); border-color:var(--border); color:var(--text);"
                        onfocus="this.style.borderColor='var(--accent)';"
                        onblur="this.style.borderColor='var(--border)';">
                    <button type="submit" :disabled="!userInput.trim() || isLoading"
                        class="w-10 h-10 rounded-xl flex items-center justify-center border-none cursor-pointer transition-all hover:scale-105 disabled:opacity-50 flex-shrink-0"
                        style="background:linear-gradient(135deg,#9FE870,#8AD95E); color:#000; box-shadow:0 4px 12px rgba(159,232,112,.3);">
                        <i class="fa-solid fa-paper-plane text-xs"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- ══ TRANSLATE BUTTON — bottom-[30px] right-[30px] ══ -->
    <button id="translate-toggle-btn"
        class="notranslate fixed bottom-[30px] right-[30px] z-[999] w-[50px] h-[50px] rounded-full flex items-center justify-center cursor-pointer text-xl text-black"
        style="background:var(--accent); border:2px solid var(--accent); box-shadow:0 4px 12px rgba(159,232,112,.4); transition:all .3s;"
        translate="no" aria-label="Toggle translation">
        <i class="fas fa-language"></i>
    </button>
    <div id="google_translate_element" class="notranslate translate-dropdown" translate="no" style="display:none;"></div>

    <script>
    // ════════════════════════════════════════
    // KEYS — all from keys.js
    // ════════════════════════════════════════
    const SUPABASE_URL      = window.API_KEYS?.SUPABASE_URL      || '';
    const SUPABASE_ANON_KEY = window.API_KEYS?.SUPABASE_ANON_KEY || '';
    const supabaseClient    = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ════════════════════════════════════════
    // THEME — light default, dark on body.dark-mode
    // ════════════════════════════════════════
    function initTheme() {
        const saved = localStorage.getItem('calendarTheme') || 'light';
        applyTheme(saved);
    }
    function applyTheme(theme) {
        const icon = document.getElementById('themeIcon');
        if (theme === 'dark') {
            document.body.classList.add('dark-mode');
            icon.classList.replace('fa-sun','fa-moon');
        } else {
            document.body.classList.remove('dark-mode');
            icon.classList.replace('fa-moon','fa-sun');
        }
    }
    function toggleTheme() {
        const next = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
        localStorage.setItem('calendarTheme', next);
        applyTheme(next);
        setTimeout(applyTranslateColors, 50);
    }
    initTheme();
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    // ════════════════════════════════════════
    // PAGE PROTECTION
    // ════════════════════════════════════════
    function protectPage() {
        const lu = localStorage.getItem('loggedInUser');
        if (!lu) { window.location.href='faculty_login.html'; return false; }
        try { JSON.parse(lu); return true; }
        catch { localStorage.removeItem('loggedInUser'); window.location.href='faculty_login.html'; return false; }
    }
    if (!protectPage()) throw new Error('Authentication required');

    // ════════════════════════════════════════
    // CALENDAR APP
    // ════════════════════════════════════════
    class CalendarApp {
        constructor() {
            this.currentDate = new Date();
            this.today = new Date();
            this.selectedDateKey = null;
            this.announcements = {};
            this.announcementDetails = {};
            this.currentUserProfile = null;
            this.monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            this.dayNames   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            this.init();
        }

        async init() {
            document.getElementById('prevMonth').addEventListener('click', () => this.prevMonth());
            document.getElementById('nextMonth').addEventListener('click', () => this.nextMonth());
            document.getElementById('closeBtn').addEventListener('click', () => this.closeModal());
            document.getElementById('closeEditBtn').addEventListener('click', () => this.closeEditModal());
            document.getElementById('closeViewBtn').addEventListener('click', () => this.closeViewModal());

            document.getElementById('modalOverlay').addEventListener('click', e => { if(e.target.id==='modalOverlay') this.closeModal(); });
            document.getElementById('editModalOverlay').addEventListener('click', e => { if(e.target.id==='editModalOverlay') this.closeEditModal(); });
            document.getElementById('viewModalOverlay').addEventListener('click', e => { if(e.target.id==='viewModalOverlay') this.closeViewModal(); });

            document.getElementById('add-announcement-form').addEventListener('submit', e => { e.preventDefault(); this.addAnnouncement(); });
            document.getElementById('edit-announcement-form').addEventListener('submit', e => { e.preventDefault(); this.handleEditSubmit(); });

            document.addEventListener('keydown', e => {
                if (e.key==='Escape') { this.closeModal(); this.closeEditModal(); this.closeViewModal(); }
            });

            document.getElementById('modal-announcement-list').addEventListener('click', e => {
                const view   = e.target.closest('.view-item-btn');
                const edit   = e.target.closest('.edit-item-btn');
                const del    = e.target.closest('.delete-item-btn');
                if (view)  this.openViewModal(view.dataset.id);
                else if (edit)  this.openEditModal(edit.dataset.id);
                else if (del)   this.deleteAnnouncement(del.dataset.id);
            });

            await this.loadUserProfile();
            await this.loadAnnouncementsFromSupabase();
            this.renderCalendar();
        }

        async loadUserProfile() {
            const lu = JSON.parse(localStorage.getItem('loggedInUser'));
            if (!lu?.email) { window.location.href='faculty_login.html'; return; }
            try {
                const { data, error } = await supabaseClient.from('members').select('id,full_name,avatar_url,email,user_type').eq('email',lu.email).single();
                if (error) throw error;
                this.currentUserProfile = data;
            } catch(err) {
                alert('Could not fetch user profile. Please log in again.');
                localStorage.removeItem('loggedInUser');
                window.location.href='faculty_login.html';
            }
        }

        async loadAnnouncementsFromSupabase() {
            try {
                const year = this.currentDate.getFullYear();
                const month = this.currentDate.getMonth() + 1;
                const firstDay    = new Date(year, month-1, 1);
                const lastDay     = new Date(year, month, 0);
                const calStart    = new Date(firstDay); calStart.setDate(calStart.getDate()-firstDay.getDay());
                const calEnd      = new Date(lastDay);  calEnd.setDate(calEnd.getDate()+(6-lastDay.getDay()));

                const { data, error } = await supabaseClient
                    .from('announcements')
                    .select(`*, members:posted_by_user_id (full_name, avatar_url)`)
                    .gte('posted_at', `${this.fmtKey(calStart)} 00:00:00`)
                    .lte('posted_at', `${this.fmtKey(calEnd)} 23:59:59`)
                    .order('posted_at', { ascending: true });
                if (error) throw error;

                this.announcements = {}; this.announcementDetails = {};
                (data||[]).forEach(row => {
                    const dk = row.posted_at.substring(0,10);
                    if (!this.announcements[dk]) { this.announcements[dk]=[]; this.announcementDetails[dk]=[]; }
                    this.announcements[dk].push(row.title);
                    this.announcementDetails[dk].push(row);
                });
            } catch(err) {
                alert('Failed to load announcements: ' + err.message);
            }
        }

        fmtKey(d) { return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`; }
        formatDate(ds) { if(!ds)return'No date'; const d=new Date(ds); return isNaN(d)?'Invalid Date':d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); }
        esc(t) { if(t==null)return''; return String(t).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
        isSameDay(d1,d2) { return d1.getFullYear()===d2.getFullYear()&&d1.getMonth()===d2.getMonth()&&d1.getDate()===d2.getDate(); }

        async prevMonth() { this.currentDate.setMonth(this.currentDate.getMonth()-1); await this.loadAnnouncementsFromSupabase(); this.renderCalendar(); }
        async nextMonth() { this.currentDate.setMonth(this.currentDate.getMonth()+1); await this.loadAnnouncementsFromSupabase(); this.renderCalendar(); }

        renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            document.getElementById('monthYear').textContent = `${this.monthNames[this.currentDate.getMonth()]} ${this.currentDate.getFullYear()}`;
            grid.innerHTML = '';
            this.dayNames.forEach(day => {
                const h=document.createElement('div');
                h.className='day-header text-center py-2 sm:py-3 rounded-xl text-xs sm:text-sm shadow-md';
                h.textContent=day; grid.appendChild(h);
            });
            const firstDay = new Date(this.currentDate.getFullYear(),this.currentDate.getMonth(),1);
            const start    = new Date(firstDay); start.setDate(start.getDate()-firstDay.getDay());
            for (let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);grid.appendChild(this.createDateEl(d));}
        }

        createDateEl(date) {
            const el = document.createElement('div');
            el.className = 'calendar-date rounded-xl p-1 sm:p-2 flex flex-col cursor-pointer';
            el.setAttribute('tabindex','0');

            const num = document.createElement('div');
            num.className = 'date-number font-bold text-xs sm:text-sm lg:text-base mb-1';
            num.style.color = 'var(--text)';
            num.textContent = date.getDate();
            el.appendChild(num);

            const dk = this.fmtKey(date);
            const anns = this.announcements[dk] || [];
            if (anns.length > 0) {
                const list = document.createElement('ul');
                list.className = 'announcement-list space-y-1 flex-grow overflow-y-auto';
                anns.forEach(t => {
                    const li=document.createElement('li');
                    li.className='ann-pill rounded px-1 sm:px-2 py-0.5 sm:py-1 text-[.6rem] sm:text-xs truncate';
                    li.textContent=t; li.title=t; list.appendChild(li);
                });
                el.appendChild(list);
            } else {
                const ph=document.createElement('div');
                ph.className='text-[.6rem] sm:text-xs italic';
                ph.style.color='var(--text-muted)';
                ph.textContent='No events'; el.appendChild(ph);
            }

            if (this.isSameDay(date,this.today)) el.classList.add('today');
            if (date.getMonth()!==this.currentDate.getMonth()) el.classList.add('opacity-40','pointer-events-none');

            const open = () => this.openModal(date);
            el.addEventListener('click', open);
            el.addEventListener('keydown', e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open();}});
            return el;
        }

        openModal(date) {
            this.selectedDateKey = this.fmtKey(date);
            document.getElementById('modalDateTitle').textContent = date.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
            this.renderModalList();
            const m=document.getElementById('modalOverlay');
            m.classList.remove('hidden'); m.classList.add('flex');
            document.getElementById('announcement-title').focus();
        }

        renderModalList() {
            const listEl = document.getElementById('modal-announcement-list');
            listEl.innerHTML = '';
            const items = this.announcementDetails[this.selectedDateKey] || [];
            if (!items.length) {
                listEl.innerHTML=`<li class="text-center py-8 text-base sm:text-lg" style="color:var(--text-muted);">No announcements for this day.</li>`;
                return;
            }
            items.forEach(ann => {
                const li=document.createElement('li');
                li.className='ann-list-item p-4 sm:p-6 rounded-xl';

                const isOwner = this.currentUserProfile?.id === ann.posted_by_user_id;
                const actionBtns = isOwner ? `
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <button class="edit-item-btn w-8 h-8 flex items-center justify-center rounded-full transition-all hover:scale-110 text-sm"
                            style="color:var(--text-muted);"
                            onmouseover="this.style.color='var(--accent)';this.style.background='var(--hover)';"
                            onmouseout="this.style.color='var(--text-muted)';this.style.background='transparent';"
                            data-id="${ann.id}" aria-label="Edit">
                            <i class="fas fa-pencil-alt"></i>
                        </button>
                        <button class="delete-item-btn w-8 h-8 flex items-center justify-center rounded-full transition-all hover:scale-110 text-sm text-red-500 hover:text-red-400"
                            onmouseover="this.style.background='rgba(239,68,68,.1)';"
                            onmouseout="this.style.background='transparent';"
                            data-id="${ann.id}" aria-label="Delete">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </div>` : '';

                const meta = (ann.category||ann.target_audience) ? `
                    <div class="flex flex-wrap gap-2 mt-2">
                        ${ann.category?`<span class="ann-pill px-3 py-1 rounded-full text-xs sm:text-sm">${this.esc(ann.category)}</span>`:''}
                        ${ann.target_audience?`<span class="ann-pill px-3 py-1 rounded-full text-xs sm:text-sm">${this.esc(ann.target_audience)}</span>`:''}
                    </div>` : '';

                const pName = this.esc(ann.members?.full_name||'Unknown');
                const pAvat = this.esc(ann.members?.avatar_url||'https://cdn-icons-png.flaticon.com/512/847/847969.png');

                li.innerHTML = `
                    <div class="flex items-start justify-between gap-2 mb-2">
                        <div class="font-bold text-base sm:text-lg flex-grow break-words" style="color:var(--accent);">${this.esc(ann.title)}</div>
                        ${actionBtns}
                    </div>
                    ${meta}
                    <div class="flex items-center gap-2 mt-3">
                        <img src="${pAvat}" alt="${pName}" class="poster-avatar w-8 h-8 rounded-full object-cover"
                             onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
                        <span class="text-sm font-medium" style="color:var(--text-muted);">Posted by: ${pName}</span>
                    </div>
                    <p class="text-sm mt-2 line-clamp-3" style="color:var(--text-muted);">${this.esc(ann.summary)||'No summary provided.'}</p>
                    <div class="mt-4 pt-4 detail-divider">
                        <button class="view-item-btn w-full font-semibold py-2 px-4 rounded-lg flex items-center justify-center gap-2 transition-all duration-300"
                            style="background:var(--surface); color:var(--accent); border:1px solid var(--accent);"
                            onmouseover="this.style.background='var(--accent)';this.style.color='#000';"
                            onmouseout="this.style.background='var(--surface)';this.style.color='var(--accent)';"
                            data-id="${ann.id}">
                            <i class="fas fa-eye"></i> View Details
                        </button>
                    </div>`;
                listEl.appendChild(li);
            });
        }

        closeModal() {
            const m=document.getElementById('modalOverlay');
            m.classList.add('hidden'); m.classList.remove('flex');
            this.selectedDateKey=null;
            document.getElementById('add-announcement-form').reset();
        }

        async addAnnouncement() {
            const title    = document.getElementById('announcement-title').value.trim();
            const desc     = document.getElementById('announcement-description').value.trim();
            const category = document.getElementById('announcement-category').value.trim();
            const audience = document.getElementById('announcement-audience').value.trim();
            if (!title||!category) { alert('Please fill in both title and category.'); return; }
            if (!this.currentUserProfile?.id) { alert('User profile not loaded.'); return; }

            try {
                const { data, error } = await supabaseClient.from('announcements').insert([{
                    title, description:desc||null,
                    scheduled_date:this.selectedDateKey,
                    posted_at:this.selectedDateKey,
                    category, target_audience:audience||null,
                    posted_by_user_id:this.currentUserProfile.id
                }]).select().single();
                if (error) throw error;

                const newAnn = { ...data, members:{ full_name:this.currentUserProfile.full_name, avatar_url:this.currentUserProfile.avatar_url }};
                const dk = newAnn.posted_at.substring(0,10);
                if (!this.announcements[dk]) { this.announcements[dk]=[]; this.announcementDetails[dk]=[]; }
                this.announcements[dk].push(newAnn.title);
                this.announcementDetails[dk].push(newAnn);

                this.renderCalendar();
                if (dk===this.selectedDateKey) this.renderModalList();
                document.getElementById('add-announcement-form').reset();
                document.getElementById('announcement-title').focus();
            } catch(err) { alert('Failed to add announcement: '+err.message); }
        }

        async deleteAnnouncement(id) {
            let ann=null, dk=null;
            for (const k in this.announcementDetails) { const f=this.announcementDetails[k].find(i=>i.id==id); if(f){ann=f;dk=k;break;} }
            if (!ann) return;
            if (ann.posted_by_user_id!==this.currentUserProfile.id) { alert('Not authorized to delete this announcement.'); return; }
            if (!confirm('Delete this announcement?')) return;
            try {
                const{error}=await supabaseClient.from('announcements').delete().eq('id',id);
                if(error)throw error;
                const idx=this.announcementDetails[dk].findIndex(i=>i.id==id);
                if(idx!==-1){this.announcementDetails[dk].splice(idx,1);this.announcements[dk].splice(idx,1);}
                if(!this.announcements[dk]?.length){delete this.announcements[dk];delete this.announcementDetails[dk];}
                this.renderCalendar(); this.renderModalList();
            } catch(err) { alert('Failed to delete: '+err.message); }
        }

        openEditModal(id) {
            let ann=null;
            for (const k in this.announcementDetails){const f=this.announcementDetails[k].find(i=>i.id==id);if(f){ann=f;break;}}
            if (!ann) return;
            document.getElementById('edit-announcement-id').value=ann.id;
            document.getElementById('edit-announcement-title').value=ann.title||'';
            document.getElementById('edit-announcement-description').value=ann.description||'';
            document.getElementById('edit-announcement-category').value=ann.category||'';
            document.getElementById('edit-announcement-audience').value=ann.target_audience||'';
            const m=document.getElementById('editModalOverlay');
            m.classList.remove('hidden'); m.classList.add('flex');
            document.getElementById('edit-announcement-title').focus();
        }
        closeEditModal() {
            const m=document.getElementById('editModalOverlay');
            m.classList.add('hidden'); m.classList.remove('flex');
            document.getElementById('edit-announcement-form').reset();
        }

        openViewModal(id) {
            let ann=null;
            for (const k in this.announcementDetails){const f=this.announcementDetails[k].find(i=>i.id==id);if(f){ann=f;break;}}
            if (!ann) return;
            document.getElementById('viewModalTitle').textContent=this.esc(ann.title);
            document.getElementById('viewModalBody').innerHTML=`
                <div class="space-y-4">
                    <div class="flex items-start"><i class="fas fa-file-export w-6 text-center mr-3 pt-1 flex-shrink-0 detail-icon"></i>
                        <div style="color:var(--text);"><strong style="color:var(--text-muted);">Date posted:</strong> ${this.formatDate(ann.posted_at)}</div></div>
                    <div class="flex items-start"><i class="fas fa-calendar-check w-6 text-center mr-3 pt-1 flex-shrink-0 detail-icon"></i>
                        <div style="color:var(--text);"><strong style="color:var(--text-muted);">Date scheduled:</strong> ${this.formatDate(ann.scheduled_date)}</div></div>
                    <div class="flex items-start"><i class="fas fa-question-circle w-6 text-center mr-3 pt-1 flex-shrink-0 detail-icon"></i>
                        <div style="color:var(--text);"><strong style="color:var(--text-muted);">Why:</strong> ${this.esc(ann.why)||'N/A'}</div></div>
                    <div class="flex items-start"><i class="fas fa-map-marker-alt w-6 text-center mr-3 pt-1 flex-shrink-0 detail-icon"></i>
                        <div style="color:var(--text);"><strong style="color:var(--text-muted);">Location:</strong> ${this.esc(ann.location)||'N/A'}</div></div>
                    <div class="flex items-start pt-4 detail-divider">
                        <i class="fas fa-align-left w-6 text-center mr-3 pt-1 flex-shrink-0 detail-icon"></i>
                        <div style="color:var(--text);">
                            <strong style="color:var(--text-muted);">Full Content:</strong>
                            <div class="mt-1" style="color:var(--text-muted);">${(this.esc(ann.description)||'No description provided.').replace(/\n/g,'<br>')}</div>
                        </div>
                    </div>
                </div>`;
            const m=document.getElementById('viewModalOverlay');
            m.classList.remove('hidden'); m.classList.add('flex');
        }
        closeViewModal() {
            const m=document.getElementById('viewModalOverlay');
            m.classList.add('hidden'); m.classList.remove('flex');
        }

        async handleEditSubmit() {
            const id  = document.getElementById('edit-announcement-id').value;
            const upd = {
                title:          document.getElementById('edit-announcement-title').value.trim(),
                description:    document.getElementById('edit-announcement-description').value.trim()||null,
                category:       document.getElementById('edit-announcement-category').value.trim(),
                target_audience:document.getElementById('edit-announcement-audience').value.trim()||null
            };
            if (!upd.title||!upd.category) { alert('Please fill in both title and category.'); return; }
            try {
                const{data,error}=await supabaseClient.from('announcements').update(upd).eq('id',id).select().single();
                if(error)throw error;
                const dk=data.posted_at.substring(0,10);
                if(this.announcementDetails[dk]){
                    const idx=this.announcementDetails[dk].findIndex(i=>i.id==id);
                    if(idx!==-1){
                        this.announcementDetails[dk][idx]={...this.announcementDetails[dk][idx],...data};
                        this.announcements[dk][idx]=data.title;
                    }
                }
                this.renderCalendar(); this.renderModalList(); this.closeEditModal();
            } catch(err){ alert('Failed to update: '+err.message); }
        }
    }

    new CalendarApp();

    function getThemeColors() {
        const isLight = !document.body.classList.contains('dark-mode');
        return { text:isLight?'#163300':'#ffffff', bg:isLight?'#e8f5e0':'#1a1a1a', border:isLight?'#c9e5ba':'#2d5514' };
    }
    function applyTranslateColors() {
        const dd=document.getElementById('google_translate_element'); if(!dd)return;
        const{text,bg,border}=getThemeColors();
        const combo=dd.querySelector('.goog-te-combo,select');
        if(combo){combo.style.setProperty('color',text,'important');combo.style.setProperty('background-color',bg,'important');combo.style.setProperty('border',`1px solid ${border}`,'important');combo.style.setProperty('border-radius','8px','important');combo.style.setProperty('padding','6px 10px','important');combo.style.setProperty('font-weight','600','important');combo.style.setProperty('font-family','Inter,sans-serif','important');combo.style.setProperty('font-size','.85rem','important');combo.style.setProperty('outline','none','important');combo.style.setProperty('cursor','pointer','important');combo.querySelectorAll('option').forEach(o=>{o.style.setProperty('color',text,'important');o.style.setProperty('background-color',bg,'important');});}
        dd.querySelectorAll('span,a,.goog-te-menu-value,.goog-te-menu-value span').forEach(el=>el.style.setProperty('color',text,'important'));
    }
    function suppressTranslateBanner() {
        function hide(){document.querySelectorAll('.goog-te-banner-frame,.skiptranslate > iframe,#goog-gt-tt,.goog-te-balloon-frame').forEach(el=>{el.style.setProperty('display','none','important');el.style.setProperty('height','0','important');el.style.setProperty('visibility','hidden','important');});if(document.body.style.top&&document.body.style.top!=='0px'){document.body.style.setProperty('top','0','important');document.body.style.setProperty('margin-top','0','important');}}
        new MutationObserver(hide).observe(document.body,{attributes:true,attributeFilter:['style','class'],childList:true});
        new MutationObserver(hide).observe(document.head,{childList:true});
        hide();
    }
    function initTranslationToggle() {
        const btn=document.getElementById('translate-toggle-btn'),dd=document.getElementById('google_translate_element');
        if(!btn||!dd)return;
        btn.addEventListener('click',e=>{e.stopPropagation();const vis=dd.style.display==='block';dd.style.display=vis?'none':'block';if(!vis)applyTranslateColors();});
        document.addEventListener('click',e=>{if(!e.target.closest('#translate-toggle-btn')&&!e.target.closest('#google_translate_element'))dd.style.display='none';});
        document.getElementById('themeToggle').addEventListener('click',()=>setTimeout(applyTranslateColors,50));
        new MutationObserver(applyTranslateColors).observe(dd,{childList:true,subtree:true,attributes:true,attributeFilter:['style']});
        let tries=0;const poll=setInterval(()=>{applyTranslateColors();if(++tries>=20)clearInterval(poll);},500);
        suppressTranslateBanner();
    }
    if (document.readyState==='loading') document.addEventListener('DOMContentLoaded',initTranslationToggle);
    else initTranslationToggle();

    function initChatbot() {

            isLoading: false,
            sessionId: 'session_'+Date.now()+'_'+Math.random().toString(36).substr(2,9),
            messages: [{ role:'assistant', content:'Hi! I can help you find and manage announcements on the calendar, check dates, and answer campus questions. What would you like to know?' }],

            async sendMessage() {
                if (!this.userInput.trim()) return;
                this.messages.push({ role:'user', content:this.userInput });
                const input=this.userInput; this.userInput=''; this.isLoading=true; this.scrollToBottom();

                        .order('posted_at',{ascending:false,nullsFirst:false})
                        .limit(15);

                    const opts={year:'numeric',month:'short',day:'numeric'};
                    const ctx=(recent||[]).map((a,i)=>`[${i+1}] ${a.title}\nCategory:${a.category||'General'}\nPosted:${a.posted_at?new Date(a.posted_at).toLocaleDateString('en-US',opts):'N/A'}\nScheduled:${a.scheduled_date?new Date(a.scheduled_date).toLocaleDateString('en-US',opts):'N/A'}\nAudience:${a.target_audience||'All'}\nSummary:${a.summary||'N/A'}\nBy:${a.members?.full_name||'Unknown'}\n---`).join('\n')||'No announcements.';

                    const sysMsg={role:'system',content:`You are the CentraNounceIT Faculty Calendar Assistant helping faculty manage announcements.\nYou can help find announcements by date, category, or topic, and answer general campus questions.\n\nCURRENT ANNOUNCEMENTS (newest first):\n${ctx}\n\nBe concise and helpful. Highlight upcoming deadlines and emergencies.`};
                    const apiKey=window.API_KEYS?.GROQ_API_KEY||'';
                    const msgs=[sysMsg,...this.messages.map(m=>({role:m.role,content:m.content}))];
                    const models=['llama-3.3-70b-versatile','llama-3.1-8b-instant','mixtral-8x7b-32768','llama3-8b-8192'];
                    let response=null, lastErr='';

                    for (const model of models) {
                        try {
                            const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiKey}`},body:JSON.stringify({model,messages:msgs,temperature:0.7,max_tokens:1024})});
                            if(res.ok){response=res;break;}
                            lastErr=await res.text();
                            if(res.status!==429&&res.status!==413)break;
                        }catch(fe){lastErr=fe.message;}
                    }
                    if(!response){const wm=lastErr.match(/try again in (\d+m[\d.]+s|\d+s)/i);throw new Error(wm?`RATE_LIMITED:${wm[1]}`:'API_FAILED');}
                    const data=await response.json();
                    const reply=data.choices[0].message.content;
                    this.messages.push({role:'assistant',content:reply});
                    replyAppended=true;

                    supabaseClient.from('chat_history').insert([{
                        session_id:this.sessionId, user_message:input,
                        assistant_response:reply, has_security_concern:false,
                        created_at:new Date().toISOString()
                    }]).then(({error})=>{if(error)console.warn('Chat history save error:',error.message);});

                } catch(err) {
                    if (!replyAppended) {
                        let msg='Sorry, I encountered an error. Please try again.';
                        if(err.message?.startsWith('RATE_LIMITED:'))msg=`⏳ Rate limited. Please try again in ${err.message.replace('RATE_LIMITED:','')}`;
                        this.messages.push({role:'assistant',content:msg});
                    }
                    console.error('Chatbot error:',err);
                } finally {
                    this.isLoading=false; this.scrollToBottom();
                }
            },

            scrollToBottom() {
                this.$nextTick(()=>{const c=document.getElementById('chatbot-messages-container');if(c)c.scrollTop=c.scrollHeight;});
            }
        };
    }
    </script>
</body>
</html>
